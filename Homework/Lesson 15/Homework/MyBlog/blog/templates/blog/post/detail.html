{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} | Блог</title>
    <link rel="stylesheet" href="{% static 'blog/css/style.css' %}">
</head>
<body>

<div class="container">
    <a href="{% url 'blog:post_list' %}" class="btn back-link">
        ← Назад к списку
    </a>

    <div class="post-full">
        <article class="post-card">
            <header class="post-header">
                <h1>{{ post.title }}</h1>
                <div class="post-meta">
                    📅 {{ post.created_at|date:"d E Y" }} в {{ post.created_at|time:"H:i" }}
                </div>
            </header>

            <hr class="post-divider">

            <div class="post-content">
                {{ post.content|linebreaks }}
            </div>
        </article>
    </div>
</div>

</body>
</html>
